<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Position and Table Practice</title>
        <style>
            body {
                font-family: serif;
            }
    
            table {
                border-collapse: collapse;
                width: 250px;
                text-align: left;
                font-size: 18px;
            }
    
            th, td {
                border: 1px solid black;
                padding: 10px;
            }
    
            th {
                background-color: #666666; 
                color: white;          
            }
    
            tbody tr:nth-child(odd) {
                background-color: yellow;
            }
            
            tbody tr:nth-child(even) {
                background-color: white;
            }
    
            .fixed-box {
                position: fixed;
                top: 10px;
                right: 10px;
                border: 3px solid #6b8e23;
                padding: 15px;
                width: 100px;
                background-color: white;
                font-size: 18px;
            }
        </style>
    </head>
    <body>
    
        <table>
            <thead>
                <tr>
                    <th>Firstname</th>
                    <th>Lastname</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>1</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>2</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>3</td>
                </tr>
            </tbody>
        </table>
    
        <div class="fixed-box">
            This div element has position: fixed;
        </div>
    
    </body>
</html>
