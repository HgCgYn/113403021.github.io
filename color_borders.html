<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <title>exercise 16</title>
      <style>
          body {
              display: flex;
              flex-direction: column;
              align-items: flex-start;
              gap: 20px;
          }
  
          h1 {
              margin: 0;
              width: fit-content;
              min-width: 400px;
          }
  
          .box-1 {
              background-color: lightblue;
              border: 6px double tomato;
          }
  
          .box-2 {
              background-color: yellow;
              border: 3px solid #009dff;
              border-radius: 15px;
          }
  
          .box-3 {
              background-color: #3cb371;
              border: 10px dotted gray;
          }
      </style>
  </head>
  <body>
  
      <h1 class="box-1">Hello World</h1>
      <h1 class="box-2">Hello World</h1>
      <h1 class="box-3">Hello World</h1>
  
  </body>
</html>
